<!DOCTYPE html>
<!--
  Source for public/og-image.png (1200x630 social card).
  Regenerate with:
  "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless=new \
    --disable-gpu --screenshot=public/og-image.png --window-size=1200,630 \
    --hide-scrollbars "file://$PWD/design/og.html"
-->
<html><head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; background: #FBFAF8; color: #1D1C1A;
    font-family: "Avenir Next", "Futura", "Segoe UI", sans-serif;
    display: flex; align-items: center; padding: 0 90px; position: relative;
    overflow: hidden;
  }
  .rule-top { position: absolute; top: 70px; left: 90px; right: 90px; height: 1px; background: #E5E2DB; }
  .rule-bot { position: absolute; bottom: 70px; left: 90px; right: 90px; height: 1px; background: #E5E2DB; }
  .text { flex: 1; }
  .kicker {
    font-family: ui-monospace, Menlo, monospace; font-size: 22px; color: #2547C9;
    letter-spacing: 2px; margin-bottom: 28px;
  }
  h1 { font-size: 84px; font-weight: 600; letter-spacing: -2.5px; line-height: 1.02; margin-bottom: 30px; }
  .name {
    font-family: ui-monospace, Menlo, monospace; font-size: 26px; color: #57544E;
  }
  .name b { color: #1D1C1A; font-weight: 600; }
  img.portrait {
    width: 260px; height: 260px; border-radius: 50%; object-fit: cover;
    border: 1px solid #E5E2DB; box-shadow: 0 0 0 10px #FBFAF8, 0 0 0 11px #E5E2DB;
    margin-left: 60px;
  }
</style></head>
<body>
  <div class="rule-top"></div>
  <div class="text">
    <div class="kicker">STAFF ML ENGINEER · BARCELONA</div>
    <h1>Data platforms,<br>end to end.</h1>
    <div class="name"><b>leandro szikora panaia</b> · leandroszikora.github.io</div>
  </div>
  <img class="portrait" src="../public/photo.jpg" alt="">
  <div class="rule-bot"></div>
</body></html>
