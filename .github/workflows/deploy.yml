# Build and deploy the Astro portfolio to GitHub Pages.
#
# Site: https://leandroszikora.github.io/lszp-portfolio
#
# One-time repo setup required: Pages source must be "GitHub Actions"
# (Settings -> Pages -> Build and deployment -> Source), or via:
#   gh api repos/leandroszikora/lszp-portfolio/pages -f build_type=workflow
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
